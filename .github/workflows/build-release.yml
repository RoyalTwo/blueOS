name: Build Release

on:
  push:
    tags:
      - "v*.*.*"
permissions:
  contents: write
  packages: read

jobs:
  build:
    runs-on: ubuntu-latest
    container:
      image: ghcr.io/royaltwo/blueos-compiler:latest
      credentials:
        username: ${{ github.actor }}
        password: ${{ secrets.GITHUB_TOKEN }}

    steps:
    - uses: actions/checkout@v4

    - name: Build
      run: make KCC=/usr/local/bin/compiler/bin/x86_64-elf-gcc
      
    - name: Install Limine
      run: ./InstallLimine.sh

    - name: Create ISO
      run: ./CreateISO.sh
      
    - name: Release
      uses: softprops/action-gh-release@v3
      with:
        generate_release_notes: true
        working_directory: bin
        files: |
          blueOS
          blueOS.iso
